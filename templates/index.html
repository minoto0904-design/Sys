<!DOCTYPE html>
<html>
<head>
    <title>Sysdiagnose Scanner</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: #00ff00;
            font-family: monospace;
            overflow: hidden;
        }

        .matrix {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('https://i.imgur.com/3ZQ3Z9X.gif');
            background-size: cover;
            opacity: 0.15;
            z-index: 0;
        }

        .panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #00ff00;
            padding: 20px;
            z-index: 1;
            box-shadow: 0 0 20px #00ff00;
        }

        h1 {
            text-align: center;
            text-shadow: 0 0 10px #00ff00;
        }

        input, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: black;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: monospace;
        }

        button:hover {
            background: #00ff00;
            color: black;
        }

        .result {
            margin-top: 15px;
            border-top: 1px solid #00ff00;
            padding-top: 10px;
        }
    </style>
</head>

<body>

<div class="matrix"></div>

<div class="panel">
    <h1>SYSDIAGNOSE SCANNER</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file">
        <button type="submit">ANALISAR SISTEMA</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>RESULTADOS:</h3>
        <ul>
        {% for r in result %}
            <li>{{ r }}</li>
        {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

</body>
</html>
